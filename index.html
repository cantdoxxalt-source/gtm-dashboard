<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily GTM Tasks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border-radius: 16px;
            border: 1px solid #3730a3;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: #94a3b8; font-size: 14px; }
        .date-display { color: #6366f1; font-weight: 600; margin-top: 10px; }
        .progress-bar {
            background: #1e1b2e;
            border-radius: 12px;
            padding: 4px;
            margin: 20px auto;
            max-width: 600px;
            border: 1px solid #312e81;
        }
        .progress-fill {
            height: 24px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 800px;
            margin: 0 auto 30px;
        }
        .stat-card {
            background: #1e1b2e;
            border: 1px solid #312e81;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: #818cf8; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #312e81;
            padding-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #312e81;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn:hover { border-color: #6366f1; color: #c7c3ff; }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
        }
        .tab-content { max-width: 900px; margin: 0 auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .task-item {
            background: #1e1b2e;
            border: 1px solid #312e81;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .task-item:hover { border-color: #6366f1; }
        .task-item.completed {
            opacity: 0.5;
            border-color: #22c55e;
        }
        .task-item.completed .task-content { text-decoration: line-through; }
        .task-header {
            display: flex;
            align-items: start;
            gap: 15px;
            margin-bottom: 12px;
        }
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #6366f1;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .checkbox:hover { background: #312e81; }
        .checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
        }
        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }
        .task-content { flex: 1; }
        .task-title { font-weight: 600; font-size: 15px; margin-bottom: 5px; }
        .task-preview { font-size: 13px; color: #94a3b8; line-height: 1.5; }
        .task-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-left: 39px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #312e81; color: #c7c3ff; }
        .btn-secondary:hover { background: #3730a3; }
        .draft-box {
            background: #0f0d1a;
            border: 1px solid #312e81;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            margin-left: 39px;
            font-size: 13px;
            color: #c7c3ff;
            line-height: 1.5;
            border-left: 3px solid #6366f1;
        }
        .draft-label {
            font-size: 11px;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .generate-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 30px auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        .completion-message {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border-radius: 16px;
            border: 1px solid #22c55e;
            margin-top: 30px;
            display: none;
        }
        .completion-message.show { display: block; }
        .completion-message h2 { color: #22c55e; font-size: 24px; margin-bottom: 10px; }
        .reset-btn {
            background: transparent;
            border: 1px solid #6366f1;
            color: #6366f1;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        .reset-btn:hover { background: #312e81; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Daily GTM Tasks</h1>
        <p>Non-negotiable business activity. Complete all tasks daily.</p>
        <div class="date-display" id="current-date"></div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%">0%</div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-tweets">0/2</div>
            <div class="stat-label">Tweets Posted</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-linkedin">0/2</div>
            <div class="stat-label">LinkedIn Posts</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-tweet-eng">0/20</div>
            <div class="stat-label">Tweets Engaged</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-reddit">0/20</div>
            <div class="stat-label">Reddit Posts</div>
        </div>
    </div>
    
    <button class="generate-btn" onclick="generateDailyContent()">
        🎲 Generate Today's Unique Content Pack
    </button>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tweets')">🐦 Tweets to Post (2)</button>
        <button class="tab-btn" onclick="showTab('linkedin')">💼 LinkedIn (2)</button>
        <button class="tab-btn" onclick="showTab('engage-tweets')">🎯 Engage Tweets (20)</button>
        <button class="tab-btn" onclick="showTab('engage-reddit')">📱 Engage Reddit (20)</button>
    </div>
    
    <div class="tab-content">
        <div id="tweets-tab" class="tab-panel active"></div>
        <div id="linkedin-tab" class="tab-panel"></div>
        <div id="engage-tweets-tab" class="tab-panel"></div>
        <div id="engage-reddit-tab" class="tab-panel"></div>
    </div>
    
    <div class="completion-message" id="completion-message">
        <h2>🎉 All Tasks Complete!</h2>
        <p>You've finished your non-negotiable daily GTM activities.</p>
        <p style="color: #94a3b8; margin-top: 10px;">Come back tomorrow for fresh content.</p>
        <button class="reset-btn" onclick="resetAllTasks()">Reset for Testing</button>
    </div>

    <script>
        // Content templates
        const tweetTemplates = [
            { type: 'hot_take', templates: [
                "SEO agencies are dying.\n\nNot because SEO is dead.\nBecause AI agents do it better, faster, cheaper.\n\nThe smart agencies pivot to strategy.\nThe rest become obsolete.\n\nWhich side are you on?",
                "Your SEO agency charges $2K/month.\n\nMy AI agent costs $73.\n\nThey take 30 days to deliver.\nMy agent works 24/7.\n\nThey hide behind 'proprietary processes.'\nMy code is transparent.\n\nThe math is simple.",
                "Most founders waste $2K+/month on SEO agencies.\n\nI spend $73 on APIs.\n\nThe secret?\nAI agents handle execution.\nI focus on strategy.\n\nSystems > Hustle"
            ]},
            { type: 'educational', templates: [
                "Here's how I cut SEO costs by 96%:\n\n❌ Before: $2K/month agency\n✅ After: $73/month APIs\n\nThe 5 tools I use:\n• DataForSEO\n• OpenAI API\n• SERP API\n• Make.com\n• Google Sheets\n\nThread 🧵",
                "SEO in 2026:\n\n❌ Hiring expensive agencies\n❌ Manual keyword research\n❌ Guessing what works\n\n✅ AI agents that execute 24/7\n✅ Data-driven decisions\n✅ Predictable results\n\nThe shift is happening. Are you in?",
                "Most people do SEO wrong.\n\nThey focus on tactics.\nI focus on systems.\n\nMy AI agent:\n• Finds keywords\n• Analyzes competitors\n• Creates briefs\n• Tracks rankings\n• Sends reports\n\nCost: $73/month\nMy time: 2 hrs/week"
            ]},
            { type: 'results', templates: [
                "Results from my AI SEO agent (90 days):\n\n📈 3x organic traffic\n📈 47 new page 1 rankings\n📈 12 qualified demos\n\nCost: $73/month\nTime spent: 2 hrs/week\n\nROI: 27x\n\nSometimes less is more.",
                "Before vs After AI SEO:\n\n❌ Before:\n• 10 hrs/week on SEO\n• $2K/month fees\n• Unclear results\n\n✅ After:\n• 2 hrs/week oversight\n• $73/month costs\n• 5x more output\n\nThe math is simple.",
                "My client paid $2K/month for SEO.\n\nI replaced it with a $73 AI agent.\n\n90 days later:\n• 3x organic traffic\n• 50+ new rankings\n• 12 qualified leads\n\nAgencies hate this one simple trick."
            ]}
        ];
        
        const linkedinTemplates = [
            { type: 'story', content: `I replaced a $2,000/month SEO agency with a $73/month AI agent.

Here's the breakdown:

BEFORE:
• $2,000/month agency fees
• 10 hours/week managing them
• Unclear what they actually did
• Reports that said "we're working on it"

AFTER:
• $73/month in API costs
• 2 hours/week oversight
• Full transparency
• Real-time dashboards

What the AI agent does:
✓ Monitors 500+ keywords daily
✓ Tracks 5 competitors' backlinks
✓ Generates content briefs
✓ Runs technical audits
✓ Sends daily summaries

Results after 90 days:
📈 3x organic traffic
📈 47 new keywords on page 1
📈 12 qualified demo requests

The lesson?

Don't pay humans to do what AI can do better.

Pay humans for strategy. Let AI handle execution.

What's your take on AI in marketing?` },
            { type: 'hot_take', content: `Unpopular opinion: SEO agencies are dying.

Not because SEO is dead.
Because the model is broken.

Here's why:

1️⃣ They charge $2K+ for $200 in tools
   The margin is manual work. AI eliminates that.

2️⃣ They take 30 days to deliver what AI does in 30 minutes
   Speed is the new moat.

3️⃣ They hide behind "proprietary processes"
   It's not magic. It's automation.

4️⃣ They can't scale without hiring
   AI scales infinitely.

The agencies that survive:
→ Focus on strategy, not execution
→ Use AI to deliver 10x value
→ Charge for thinking, not doing

The rest?
Replaced by founders with $73/month AI agents.

I'm not being harsh.
I'm being honest.

I built that AI agent.

The shift is happening. Which side are you on?` }
        ];
        
        let currentTasks = {};
        const totalTasks = 44;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('current-date').textContent = today;
            
            const savedDate = localStorage.getItem('gtm-content-date');
            const savedContent = localStorage.getItem('gtm-content');
            const savedProgress = localStorage.getItem('gtm-progress');
            
            if (savedDate === new Date().toDateString() && savedContent) {
                currentTasks = JSON.parse(savedContent);
                renderAllContent();
                if (savedProgress) {
                    const progress = JSON.parse(savedProgress);
                    Object.keys(progress).forEach(id => {
                        if (progress[id]) markComplete(id, false);
                    });
                }
            } else {
                generateDailyContent();
            }
        });
        
        function generateDailyContent() {
            const date = new Date();
            const dateSeed = date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
            
            // Generate 2 unique tweets
            const tweets = [];
            const usedTemplates = new Set();
            
            for (let i = 0; i < 2; i++) {
                let template;
                do {
                    const typeIdx = Math.floor(seededRandom(dateSeed + i) * tweetTemplates.length);
                    const type = tweetTemplates[typeIdx];
                    const tmplIdx = Math.floor(seededRandom(dateSeed + i + 100) * type.templates.length);
                    template = type.templates[tmplIdx];
                } while (usedTemplates.has(template) && usedTemplates.size < 6);
                
                usedTemplates.add(template);
                tweets.push({
                    id: `tweet-${i}`,
                    content: template,
                    platform: 'Twitter',
                    type: i === 0 ? 'Tweet 1' : 'Tweet 2'
                });
            }
            
            // Generate 2 LinkedIn posts
            const linkedin = [];
            const linkedinIdx1 = dateSeed % linkedinTemplates.length;
            const linkedinIdx2 = (dateSeed + 1) % linkedinTemplates.length;
            
            linkedin.push({ ...linkedinTemplates[linkedinIdx1], id: 'linkedin-0', platform: 'LinkedIn', type: 'LinkedIn Post 1' });
            linkedin.push({ ...linkedinTemplates[linkedinIdx2], id: 'linkedin-1', platform: 'LinkedIn', type: 'LinkedIn Post 2' });
            
            // Generate 20 tweet engagement targets
            const engageTweets = generateTweetEngagements(dateSeed);
            
            // Generate 20 Reddit engagement targets
            const engageReddit = generateRedditEngagements(dateSeed);
            
            currentTasks = { tweets, linkedin, engageTweets, engageReddit };
            
            localStorage.setItem('gtm-content', JSON.stringify(currentTasks));
            localStorage.setItem('gtm-content-date', new Date().toDateString());
            localStorage.setItem('gtm-progress', JSON.stringify({}));
            
            renderAllContent();
            updateProgress();
        }
        
        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }
        
        function generateTweetEngagements(seed) {
            const handles = [
                { handle: "@troyseo", niche: "SEO expert" },
                { handle: "@naval", niche: "AI/tech philosopher" },
                { handle: "@levelsio", niche: "Indie hacker" },
                { handle: "@shreyas", niche: "Product leader" },
                { handle: "@sama", niche: "OpenAI CEO" },
                { handle: "@paulg", niche: "YC co-founder" },
                { handle: "@jasonfried", niche: "Basecamp founder" },
                { handle: "@dhh", niche: "Rails creator" },
                { handle: "@elonmusk", niche: "Tech CEO" },
                { handle: "@pmarca", niche: "VC/technologist" }
            ];
            
            const topics = [
                { topic: "AI automation", reply: "AI automation isn't the future, it's the present. Running marketing 24/7 without human bottlenecks." },
                { topic: "SEO strategy", reply: "Built my own SEO stack for $73/month using APIs. Replaces $500+/month in subscriptions." },
                { topic: "content marketing", reply: "Content at scale is now possible with AI. Generate 25+ pieces/month with 2 hours oversight." },
                { topic: "startup growth", reply: "Distribution > Product. I built SEO/content systems first, then product. Way easier." },
                { topic: "marketing efficiency", reply: "Replaced $2K/month agency with $73 AI setup. Same results, full transparency." }
            ];
            
            const engagements = [];
            for (let i = 0; i < 20; i++) {
                const handleIdx = Math.floor(seededRandom(seed + i) * handles.length);
                const topicIdx = Math.floor(seededRandom(seed + i + 50) * topics.length);
                const handle = handles[handleIdx];
                const topic = topics[topicIdx];
                
                engagements.push({
                    id: `engage-tweet-${i}`,
                    handle: handle.handle,
                    url: `https://x.com/search?q=${encodeURIComponent(handle.handle + ' ' + topic.topic)}&f=live`,
                    preview: `Recent post from ${handle.niche} about ${topic.topic}`,
                    draftReply: topic.reply
                });
            }
            return engagements;
        }
        
        function generateRedditEngagements(seed) {
            const subreddits = ["smallbusiness", "Entrepreneur", "SaaS", "juststart", "marketing", "startups"];
            
            const postTypes = [
                { title: "How do I get more customers?", reply: "SEO can be a goldmine for organic customer acquisition. I automated mine with AI - happy to share the framework." },
                { title: "Marketing on a budget?", reply: "Built my marketing system for $73/month using AI agents. Replaced a $2K agency." },
                { title: "Should I hire a marketing agency?", reply: "Consider AI automation first. I get better results for 3% of the cost." },
                { title: "Best way to generate leads?", reply: "SEO + content marketing. My best leads come from organic search, not paid ads." },
                { title: "How to compete with big companies?", reply: "AI levels the playing field. Small teams can now compete on marketing automation." },
                { title: "Content marketing tips?", reply: "Automate 80% of content creation with AI. Focus your time on strategy and engagement." },
                { title: "SEO advice needed", reply: "Built an AI SEO agent that handles 24/7 monitoring. Happy to audit your setup." },
                { title: "Growing without paid ads?", reply: "Organic growth through SEO. Takes 3-6 months but compounds forever." }
            ];
            
            const engagements = [];
            for (let i = 0; i < 20; i++) {
                const subIdx = Math.floor(seededRandom(seed + i + 100) * subreddits.length);
                const postIdx = Math.floor(seededRandom(seed + i + 150) * postTypes.length);
                const subreddit = subreddits[subIdx];
                const post = postTypes[postIdx];
                
                engagements.push({
                    id: `engage-reddit-${i}`,
                    subreddit: subreddit,
                    title: post.title,
                    url: `https://www.reddit.com/r/${subreddit}/search/?q=${encodeURIComponent(post.title)}&type=posts&sort=new`,
                    draftReply: post.reply
                });
            }
            return engagements;
        }
        
        function renderAllContent() {
            renderTweets(currentTasks.tweets);
            renderLinkedIn(currentTasks.linkedin);
            renderEngageTweets(currentTasks.engageTweets);
            renderEngageReddit(currentTasks.engageReddit);
        }
        
        function renderTweets(tweets) {
            const container = document.getElementById('tweets-tab');
            container.innerHTML = tweets.map(tweet => `
                <div class="task-item" id="${tweet.id}">
                    <div class="task-header">
                        <div class="checkbox" onclick="toggleComplete('${tweet.id}')"></div>
                        <div class="task-content">
                            <div class="task-title">${tweet.type}</div>
                            <div class="task-preview" style="white-space: pre-wrap;">${tweet.content}</div>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-primary" onclick="copyToClipboard('${encodeURIComponent(tweet.content)}')">Copy Text</button>
                        <button class="btn btn-secondary" onclick="window.open('https://x.com/compose/post', '_blank')">Open X</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderLinkedIn(posts) {
            const container = document.getElementById('linkedin-tab');
            container.innerHTML = posts.map(post => `
                <div class="task-item" id="${post.id}">
                    <div class="task-header">
                        <div class="checkbox" onclick="toggleComplete('${post.id}')"></div>
                        <div class="task-content">
                            <div class="task-title">${post.type}</div>
                            <div class="task-preview" style="white-space: pre-wrap;">${post.content.substring(0, 200)}...</div>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-primary" onclick="copyToClipboard('${encodeURIComponent(post.content)}')">Copy Full Text</button>
                        <button class="btn btn-secondary" onclick="window.open('https://www.linkedin.com/post/new', '_blank')">Open LinkedIn</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderEngageTweets(targets) {
            const container = document.getElementById('engage-tweets-tab');
            container.innerHTML = targets.map((target, i) => `
                <div class="task-item" id="${target.id}">
                    <div class="task-header">
                        <div class="checkbox" onclick="toggleComplete('${target.id}')"></div>
                        <div class="task-content">
                            <div class="task-title">${target.handle}</div>
                            <div class="task-preview">${target.preview}</div>
                        </div>
                    </div>
                    <div class="draft-box">
                        <div class="draft-label">Your Draft Reply</div>
                        ${target.draftReply}
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-primary" onclick="copyToClipboard('${encodeURIComponent(target.draftReply)}')">Copy Draft</button>
                        <button class="btn btn-secondary" onclick="window.open('${target.url}', '_blank')">Find Post</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderEngageReddit(targets) {
            const container = document.getElementById('engage-reddit-tab');
            container.innerHTML = targets.map((target, i) => `
                <div class="task-item" id="${target.id}">
                    <div class="task-header">
                        <div class="checkbox" onclick="toggleComplete('${target.id}')"></div>
                        <div class="task-content">
                            <div class="task-title">r/${target.subreddit}</div>
                            <div class="task-preview">${target.title}</div>
                        </div>
                    </div>
                    <div class="draft-box">
                        <div class="draft-label">Your Draft Reply</div>
                        ${target.draftReply}
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-primary" onclick="copyToClipboard('${encodeURIComponent(target.draftReply)}')">Copy Draft</button>
                        <button class="btn btn-secondary" onclick="window.open('${target.url}', '_blank')">Find Post</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
        
        function toggleComplete(id, save = true) {
            const item = document.getElementById(id);
            const checkbox = item.querySelector('.checkbox');
            
            checkbox.classList.toggle('checked');
            item.classList.toggle('completed');
            
            if (save) {
                const progress = JSON.parse(localStorage.getItem('gtm-progress') || '{}');
                progress[id] = checkbox.classList.contains('checked');
                localStorage.setItem('gtm-progress', JSON.stringify(progress));
                updateProgress();
            }
        }
        
        function markComplete(id, save = true) {
            const item = document.getElementById(id);
            if (!item) return;
            
            const checkbox = item.querySelector('.checkbox');
            checkbox.classList.add('checked');
            item.classList.add('completed');
            
            if (save) updateProgress();
        }
        
        function updateProgress() {
            const checked = document.querySelectorAll('.checkbox.checked').length;
            const percentage = Math.round((checked / totalTasks) * 100);
            
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-fill').textContent = percentage + '%';
            
            const tweetsDone = document.querySelectorAll('#tweets-tab .checkbox.checked').length;
            const linkedinDone = document.querySelectorAll('#linkedin-tab .checkbox.checked').length;
            const tweetEngDone = document.querySelectorAll('#engage-tweets-tab .checkbox.checked').length;
            const redditDone = document.querySelectorAll('#engage-reddit-tab .checkbox.checked').length;
            
            document.getElementById('stat-tweets').textContent = `${tweetsDone}/2`;
            document.getElementById('stat-linkedin').textContent = `${linkedinDone}/2`;
            document.getElementById('stat-tweet-eng').textContent = `${tweetEngDone}/20`;
            document.getElementById('stat-reddit').textContent = `${redditDone}/20`;
            
            if (checked === totalTasks) {
                document.getElementById('completion-message').classList.add('show');
            } else {
                document.getElementById('completion-message').classList.remove('show');
            }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(decodeURIComponent(text));
        }
        
        function resetAllTasks() {
            localStorage.removeItem('gtm-progress');
            document.querySelectorAll('.checkbox').forEach(cb => cb.classList.remove('checked'));
            document.querySelectorAll('.task-item').forEach(item => item.classList.remove('completed'));
            updateProgress();
        }
    </script>
</body>
</html>
